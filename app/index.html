<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yAgents — pixel office for Claude Code</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1d1830; overflow: hidden; font-family: ui-monospace, Menlo, monospace; }
    #office { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; cursor: grab; }
    #office.dragging { cursor: grabbing; }
    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #1d1830; color: #e8e0f5; z-index: 10; }
    .overlay .box { max-width: 440px; text-align: center; padding: 32px; border: 4px solid #6b5b8a; background: #2a2438; }
    .overlay h1 { font-size: 18px; color: #d4a017; }
    .overlay p { font-size: 13px; line-height: 1.6; color: #b8a8d8; }
    .overlay code { background: #1d1830; padding: 2px 6px; color: #5a8f5a; }
    .overlay button { font: inherit; background: #d4a017; border: none; padding: 10px 20px; cursor: pointer; margin-top: 12px; }
    .overlay .alt { display: block; margin-top: 16px; color: #8a7aaa; font-size: 12px; cursor: pointer; text-decoration: underline; }
    #panel { position: fixed; top: 0; right: 0; bottom: 0; width: 280px; background: #2a2438; border-left: 4px solid #6b5b8a;
             color: #e8e0f5; padding: 20px; transform: translateX(100%); transition: transform .15s; z-index: 5; font-size: 12px; }
    #panel.open { transform: translateX(0); }
    #panel h2 { font-size: 14px; color: #d4a017; margin: 0 0 12px; word-break: break-all; }
    #panel dt { color: #8a7aaa; margin-top: 10px; }
    #panel dd { margin: 2px 0 0; word-break: break-all; }
  </style>
</head>
<body>
  <canvas id="office"></canvas>
  <aside id="panel"></aside>
  <div id="start"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
